[package]
name = "wlgrid"
version = "0.1.0"
edition = "2024"

[dependencies]
eframe = { version = "0.31", default-features = true, features = ["wayland", "x11", "wgpu"] }
serde = { version = "1", features = ["derive"] }
toml = "0.9"
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
walkdir = "2"
libloading = "0.8"
winit = { version = "0.30.13", default-features = false, features = ["wayland", "x11", "rwh_06"] }
softbuffer = "0.4.8"
